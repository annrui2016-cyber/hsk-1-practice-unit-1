<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 3.0 Level 1 在线测试系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .ruby-container { display: inline-flex; flex-direction: column; align-items: center; margin: 0 6px; }
        .pinyin { font-size: 0.85rem; color: #6b7280; line-height: 1; margin-bottom: 2px; }
        .char { font-size: 1.8rem; font-weight: 500; color: #1f2937; }
        .option-sentence .char { font-size: 1.2rem; }
        .option-sentence .pinyin { font-size: 0.7rem; }
        /* 针对图片选项的特殊间距优化 */
        .img-option { aspect-ratio: 1 / 1; width: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-4 md:p-8 font-sans">

    <div class="w-full max-w-5xl flex justify-between items-center mb-6">
        <div class="bg-white px-4 py-2 rounded-lg shadow-sm border border-slate-200">
            <span class="text-slate-400 text-xs font-bold uppercase">HSK 3.0</span>
            <span class="ml-2 text-slate-800 font-bold">Level 1 Unit Practice</span>
        </div>
        <div id="progress-text" class="text-blue-600 font-black text-lg">进度: 0/0</div>
    </div>

    <div id="quiz-card" class="w-full max-w-5xl bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/50 p-6 md:p-12 border border-slate-100 transition-all">
        
        <div id="sentence-display" class="flex flex-col items-center justify-center mb-10 min-h-[140px] py-10 bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-200">
            <div class="text-slate-400 italic">正在准备题目素材...</div>
        </div>

        <div id="options-display" class="grid gap-4 md:gap-6">
            </div>
    </div>

    <div id="feedback" class="mt-8 px-10 py-4 rounded-full font-bold text-xl hidden shadow-xl transition-all animate-bounce"></div>

    <script>
        let questions = [];
        let currentIdx = 0;
        let currentAudio = null;

        async function loadData() {
            try {
                // 增加时间戳，防止浏览器缓存导致不更新题目
                const response = await fetch('./questions.json?v=' + Date.now());
                questions = await response.json();
                renderQuestion();
            } catch (err) {
                document.getElementById('sentence-display').innerHTML = `<span class="text-red-500 font-bold">❌ 题库文件 questions.json 格式错误或缺失</span>`;
            }
        }

        function renderQuestion() {
            if (currentIdx >= questions.length) {
                document.getElementById('quiz-card').innerHTML = `
                    <div class="text-center py-16">
                        <div class="text-6xl mb-6">🏆</div>
                        <h2 class="text-3xl font-black text-slate-800 mb-2">测试完成！</h2>
                        <p class="text-slate-500 mb-8">Excellent job! You've mastered these words.</p>
                        <button onclick="location.reload()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">重新开始 (Restart)</button>
                    </div>`;
                return;
            }

            const q = questions[currentIdx];
            document.getElementById('progress-text').innerText = `进度: ${currentIdx + 1}/${questions.length}`;
            
            const sentenceDiv = document.getElementById('sentence-display');
            sentenceDiv.innerHTML = ''; 

            // 1. 【听力逻辑】处理音频播放
            if (q.audio) {
                const audioBtn = document.createElement('button');
                audioBtn.className = "flex items-center px-10 py-5 bg-blue-600 text-white rounded-3xl hover:bg-blue-700 transition-all mb-4 shadow-xl active:scale-95 group";
                audioBtn.innerHTML = `
                    <svg class="w-8 h-8 mr-3 group-hover:animate-pulse" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"></path></svg>
                    <span class="text-xl font-black uppercase tracking-tight">播放音频 (Listen)</span>
                `;
                
                audioBtn.onclick = () => {
                    if(currentAudio) currentAudio.pause();
                    currentAudio = new Audio(q.audio);
                    currentAudio.play();
                };
                sentenceDiv.appendChild(audioBtn);
                
                // 听力题隐藏文字题干的逻辑：如果 JSON 里没说要强制显示，就隐藏
                if (!q.show_text) {
                    const tip = document.createElement('p');
                    tip.className = "text-slate-400 text-sm font-bold mt-2";
                    tip.innerText = "Listening Mode: Text is hidden";
                    sentenceDiv.appendChild(tip);
                }
            }

            // 2. 【渲染题干】（如果是听力且 show_text 不为 true，则不渲染文字部分）
            if (!q.audio || (q.audio && q.show_text)) {
                const targetP = q.q_pinyin || q.pinyin || [];
                const targetC = q.q_chars || q.chars || [];
                const textWrap = document.createElement('div');
                textWrap.className = "flex flex-wrap justify-center px-4";
                textWrap.innerHTML = targetP.map((p, i) => `<div class="ruby-container"><span class="pinyin">${p}</span><span class="char">${targetC[i]}</span></div>`).join('');
                sentenceDiv.appendChild(textWrap);
            }

            // 3. 【渲染选项】
            const optionsDiv = document.getElementById('options-display');
            const isTextType = q.options[0].p !== undefined;

            if (isTextType) {
                // 文字选项布局：单列大按钮
                optionsDiv.className = "grid grid-cols-1 gap-4 max-w-2xl mx-auto w-full";
                optionsDiv.innerHTML = q.options.map(opt => `
                    <button onclick="checkAnswer('${opt.id}')" class="flex items-center p-6 bg-white border-2 border-slate-100 rounded-[1.5rem] hover:border-blue-500 hover:bg-blue-50 transition-all group shadow-sm">
                        <div class="w-12 h-12 flex-shrink-0 flex items-center justify-center bg-slate-100 rounded-2xl font-black text-slate-500 group-hover:bg-blue-500 group-hover:text-white mr-6 text-xl transition-colors">${opt.id}</div>
                        <div class="flex flex-wrap option-sentence">${opt.p.map((p, i) => `<div class="ruby-container"><span class="pinyin">${p}</span><span class="char">${opt.c[i]}</span></div>`).join('')}</div>
                    </button>`).join('');
            } else {
                // 图片选项布局：移动端 2 列，PC端 5 列
                optionsDiv.className = "grid grid-cols-2 md:grid-cols-5 gap-4 md:gap-6";
                optionsDiv.innerHTML = q.options.map(opt => `
                    <button onclick="checkAnswer('${opt.id}')" class="group bg-white border-2 border-slate-100 rounded-[2rem] overflow-hidden hover:border-blue-500 transition-all shadow-md hover:shadow-xl">
                        <div class="w-full aspect-square"><img src="${opt.img}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"></div>
                        <div class="py-4 bg-slate-50 font-black text-2xl group-hover:bg-blue-500 group-hover:text-white text-center transition-colors border-t border-slate-100">${opt.id}</div>
                    </button>`).join('');
            }
            document.getElementById('feedback').classList.add('hidden');
        }

        function checkAnswer(selectedId) {
            const q = questions[currentIdx];
            const isCorrect = selectedId === q.answer;
            const fb = document.getElementById('feedback');
            fb.className = `mt-8 px-10 py-4 rounded-full font-black text-xl text-white text-center shadow-2xl transition-all ${isCorrect ? 'bg-green-500 scale-110' : 'bg-red-500 animate-shake'}`;
            fb.innerText = isCorrect ? "✅ 回答正确！Correct!" : "❌ 不对哦！Try Again";
            fb.classList.remove('hidden');
            if (isCorrect) setTimeout(() => { currentIdx++; renderQuestion(); }, 1200);
        }

        loadData();
    </script>
</body>
</html>
