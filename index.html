<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 3.0 在线测试系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .ruby-container { display: inline-flex; flex-direction: column; align-items: center; margin: 0 6px; }
        .pinyin { font-size: 0.8rem; color: #6b7280; line-height: 1; margin-bottom: 2px; }
        .char { font-size: 1.6rem; font-weight: 500; color: #1f2937; }
        .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-4 md:p-8 font-sans">

    <div class="w-full max-w-5xl mb-8">
        <div class="flex justify-between items-start">
            <div>
                <h2 id="sub-title" class="text-blue-600 font-bold text-sm tracking-widest uppercase mb-1">HSK1 - Unit 1 - Meeting Each Other</h2>
                <h1 id="main-title" class="text-3xl font-black text-slate-800">Listening 听力</h1>
                <p id="section-info" class="text-slate-500 font-medium mt-1">第一部分（1-5题）</p>
            </div>
            <div id="progress-text" class="bg-white px-6 py-3 rounded-2xl shadow-sm border border-slate-200 text-blue-600 font-black text-xl">0/0</div>
        </div>
    </div>

    <div id="quiz-card" class="w-full max-w-5xl bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/50 p-6 md:p-10 border border-slate-100">
        <div id="sentence-display" class="flex flex-col items-center justify-center mb-8 min-h-[140px] py-8 bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-200">
            <div class="text-slate-400">正在准备素材...</div>
        </div>
        <div id="options-display" class="grid gap-4 md:gap-6"></div>
    </div>

    <div id="feedback" class="mt-6 px-10 py-4 rounded-full font-bold text-lg hidden shadow-xl transition-all"></div>

    <script>
        let questions = [];
        let currentIdx = 0;
        let currentAudio = null;

        // 洗牌算法：用于打乱选项顺序
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        async function loadData() {
            try {
                const response = await fetch('./questions.json?v=' + Date.now());
                questions = await response.json();
                renderQuestion();
            } catch (err) {
                document.getElementById('sentence-display').innerHTML = `<span class="text-red-500 font-bold">❌ 题库加载失败</span>`;
            }
        }

        function renderQuestion() {
            if (currentIdx >= questions.length) {
                document.getElementById('quiz-card').innerHTML = `<div class="text-center py-16"><h2 class="text-3xl font-black text-slate-800 mb-8">🎉 练习完成！</h2><button onclick="location.reload()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-lg">重新开始</button></div>`;
                return;
            }

            const q = questions[currentIdx];
            document.getElementById('progress-text').innerText = `${currentIdx + 1}/${questions.length}`;
            
            const sentenceDiv = document.getElementById('sentence-display');
            sentenceDiv.innerHTML = ''; 

            // 1. 播放音频按钮（带题号）
            if (q.audio) {
                const audioBtn = document.createElement('button');
                audioBtn.className = "flex items-center px-8 py-4 bg-blue-600 text-white rounded-2xl hover:bg-blue-700 transition-all mb-2 shadow-lg active:scale-95 group";
                audioBtn.innerHTML = `
                    <svg class="w-6 h-6 mr-3" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"></path></svg>
                    <span class="text-lg font-bold">第${currentIdx + 1}题 - 播放录音 Play Audio</span>
                `;
                audioBtn.onclick = () => {
                    if(currentAudio) currentAudio.pause();
                    currentAudio = new Audio(q.audio);
                    currentAudio.play();
                };
                sentenceDiv.appendChild(audioBtn);
                if (!q.show_text) {
                    const tip = document.createElement('p');
                    tip.className = "text-slate-400 text-xs font-bold mt-2";
                    tip.innerText = "Listening Mode: Text Hidden";
                    sentenceDiv.appendChild(tip);
                }
            }

            // 2. 渲染文字（如果非听力或强制显示）
            if (!q.audio || (q.audio && q.show_text)) {
                const targetP = q.q_pinyin || q.pinyin || [];
                const targetC = q.q_chars || q.chars || [];
                const textWrap = document.createElement('div');
                textWrap.className = "flex flex-wrap justify-center px-4";
                textWrap.innerHTML = targetP.map((p, i) => `<div class="ruby-container"><span class="pinyin">${p}</span><span class="char">${targetC[i]}</span></div>`).join('');
                sentenceDiv.appendChild(textWrap);
            }

            // 3. 渲染选项（自动打乱顺序）
            const optionsDiv = document.getElementById('options-display');
            const isTextType = q.options[0].p !== undefined;

            // 关键：对选项进行洗牌
            const shuffledOptions = shuffleArray(q.options);

            if (isTextType) {
                optionsDiv.className = "grid grid-cols-1 gap-4 max-w-2xl mx-auto w-full";
                optionsDiv.innerHTML = shuffledOptions.map(opt => `
                    <button onclick="checkAnswer('${opt.id}')" class="flex items-center p-5 bg-white border-2 border-slate-100 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition-all group">
                        <div class="w-10 h-10 flex-shrink-0 flex items-center justify-center bg-slate-100 rounded-xl font-black text-slate-500 group-hover:bg-blue-500 group-hover:text-white mr-5 transition-colors">${opt.id}</div>
                        <div class="flex flex-wrap option-sentence">${opt.p.map((p, i) => `<div class="ruby-container"><span class="pinyin">${p}</span><span class="char">${opt.c[i]}</span></div>`).join('')}</div>
                    </button>`).join('');
            } else {
                optionsDiv.className = "grid grid-cols-2 md:grid-cols-5 gap-4";
                optionsDiv.innerHTML = shuffledOptions.map(opt => `
                    <button onclick="checkAnswer('${opt.id}')" class="group bg-white border-2 border-slate-100 rounded-3xl overflow-hidden hover:border-blue-500 transition-all shadow-md">
                        <div class="w-full aspect-square"><img src="${opt.img}" class="w-full h-full object-cover group-hover:scale-110 transition-all duration-500"></div>
                        <div class="py-3 bg-slate-50 font-black text-xl group-hover:bg-blue-500 group-hover:text-white text-center transition-colors border-t border-slate-100">${opt.id}</div>
                    </button>`).join('');
            }
            document.getElementById('feedback').classList.add('hidden');
        }

        function checkAnswer(selectedId) {
            const q = questions[currentIdx];
            const isCorrect = selectedId === q.answer;
            const fb = document.getElementById('feedback');
            fb.className = `mt-6 px-10 py-4 rounded-full font-black text-lg text-white text-center shadow-lg transition-all ${isCorrect ? 'bg-green-500' : 'bg-red-500 animate-shake'}`;
            fb.innerText = isCorrect ? "✅ 回答正确！Correct!" : "❌ 不对哦！Try Again";
            fb.classList.remove('hidden');
            if (isCorrect) setTimeout(() => { currentIdx++; renderQuestion(); }, 1200);
        }

        loadData();
    </script>
</body>
</html>
