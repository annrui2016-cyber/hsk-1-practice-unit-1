<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 3.0 Level 1 Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }
        .ruby-container { display: inline-flex; flex-direction: column; align-items: center; margin: 0 4px; }
        .pinyin { font-size: 0.75rem; color: #64748b; line-height: 1; margin-bottom: 1px; }
        .char { font-size: 1.4rem; font-weight: 700; color: #1e293b; }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
        .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-3px, 0, 0); } }
        /* 紧凑型网格 */
        .options-grid-img { grid-template-cols: repeat(5, minmax(0, 1fr)); }
        @media (max-width: 768px) { .options-grid-img { grid-template-cols: repeat(2, minmax(0, 1fr)); } }
    </style>
</head>
<body class="bg-[#f1f5f9] min-h-screen flex flex-col items-center p-2 md:p-4">

    <div class="w-full max-w-5xl mb-4">
        <div class="glass-header border-l-4 border-blue-600 rounded-xl shadow-sm p-3 md:p-5 flex justify-between items-center border border-slate-200">
            <div class="flex items-center space-x-4">
                <div class="hidden sm:block bg-blue-600 text-white p-2 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                </div>
                <div>
                    <div class="flex items-center space-x-2">
                        <span class="text-blue-600 font-black text-[10px] tracking-tighter">HSK 3.0 L1</span>
                        <span class="text-slate-400 text-[10px] font-bold">UNIT 1</span>
                    </div>
                    <h1 class="text-xl md:text-2xl font-black text-slate-900 leading-tight">Listening 听力 <span class="text-slate-400 font-medium text-sm">第一部分</span></h1>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <div class="text-right">
                    <div id="progress-text" class="text-3xl font-black text-blue-600 tabular-nums leading-none">0/0</div>
                    <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Progress</div>
                </div>
            </div>
        </div>
    </div>

    <div id="quiz-card" class="w-full max-w-5xl bg-white rounded-[2rem] shadow-xl p-4 md:p-6 border border-slate-100">
        <div id="sentence-display" class="flex flex-col items-center justify-center mb-6 min-h-[100px] py-4 bg-slate-50 rounded-[1.5rem] border border-slate-200">
            </div>
        <div id="options-display" class="grid gap-3 md:gap-4"></div>
    </div>

    <script>
        let questions = [];
        let currentIdx = 0;
        let currentAudio = null;
        
        // 内置反馈音效 (Base64)
        const sndCorrect = new Audio("data:audio/wav;base64,UklGRjIAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YRAAAAAA/5v/m/+b/5v/m/+b/5v/m/8="); 
        const sndWrong = new Audio("data:audio/wav;base64,UklGRjIAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YRAAAAAA/7v/u/+7/7v/u/+7/7v/u/8=");

        function playFeedback(isCorrect) {
            // 这里你可以替换为真实的叮咚声URL，现在暂用内置模拟
            const audio = new Audio(isCorrect ? 'https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3' : 'https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');
            audio.volume = 0.3;
            audio.play();
        }

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        async function loadData() {
            try {
                const response = await fetch('./questions.json?v=' + Date.now());
                questions = await response.json();
                renderQuestion();
            } catch (err) { console.error(err); }
        }

        function renderQuestion() {
            if (currentIdx >= questions.length) {
                document.getElementById('quiz-card').innerHTML = `
                    <div class="text-center py-10">
                        <div class="text-6xl mb-4">🎯</div>
                        <h2 class="text-2xl font-black mb-6">第一部分完成！</h2>
                        <button onclick="alert('即将开始 Part 2')" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-lg hover:scale-105 transition-all">继续做 Part 2</button>
                    </div>`;
                return;
            }

            const q = questions[currentIdx];
            document.getElementById('progress-text').innerText = `${currentIdx + 1}/${questions.length}`;
            const sentenceDiv = document.getElementById('sentence-display');
            sentenceDiv.innerHTML = ''; 

            if (q.audio) {
                const audioBtn = document.createElement('button');
                audioBtn.className = "group flex items-center px-6 py-3 bg-slate-900 text-white rounded-xl hover:bg-blue-600 transition-all shadow-lg active:scale-95";
                audioBtn.innerHTML = `<svg class="w-5 h-5 mr-3" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"></path></svg><span class="font-bold text-sm">第 ${currentIdx + 1} 题 - 点击播放</span>`;
                audioBtn.onclick = () => {
                    if(currentAudio) currentAudio.pause();
                    currentAudio = new Audio(q.audio);
                    currentAudio.play();
                };
                sentenceDiv.appendChild(audioBtn);
            }

            const optionsDiv = document.getElementById('options-display');
            const isTextType = q.options[0].p !== undefined;
            const shuffledOptions = shuffleArray(q.options);

            if (isTextType) {
                optionsDiv.className = "grid grid-cols-1 gap-3 max-w-xl mx-auto w-full";
                optionsDiv.innerHTML = shuffledOptions.map(opt => `
                    <button id="opt-${opt.id}" onclick="checkAnswer('${opt.id}', this)" class="flex items-center p-4 bg-white border-2 border-slate-100 rounded-xl hover:border-blue-500 transition-all group shadow-sm">
                        <div class="w-8 h-8 flex-shrink-0 flex items-center justify-center bg-slate-100 rounded-lg font-black text-slate-400 group-hover:bg-blue-500 group-hover:text-white mr-4 text-sm transition-all">${opt.id}</div>
                        <div class="flex flex-wrap">${opt.p.map((p, i) => `<div class="ruby-container"><span class="pinyin">${p}</span><span class="char !text-base">${opt.c[i]}</span></div>`).join('')}</div>
                    </button>`).join('');
            } else {
                optionsDiv.className = "grid options-grid-img gap-3 md:gap-4";
                optionsDiv.innerHTML = shuffledOptions.map(opt => `
                    <button id="opt-${opt.id}" onclick="checkAnswer('${opt.id}', this)" class="group bg-white border-2 border-slate-100 rounded-2xl overflow-hidden hover:border-blue-500 transition-all shadow-md relative">
                        <div class="w-full aspect-square"><img src="${opt.img}" class="w-full h-full object-cover"></div>
                        <div class="py-2 bg-slate-50 font-black text-lg group-hover:bg-blue-600 group-hover:text-white text-center border-t border-slate-100 transition-colors">${opt.id}</div>
                    </button>`).join('');
            }
        }

        function checkAnswer(selectedId, element) {
            const q = questions[currentIdx];
            const isCorrect = selectedId === q.answer;
            
            // 禁用所有按钮防止重复点击
            const allBtns = document.querySelectorAll('#options-display button');
            allBtns.forEach(btn => btn.style.pointerEvents = 'none');

            // 播放声音
            playFeedback(isCorrect);

            if (isCorrect) {
                element.classList.remove('border-slate-100');
                element.classList.add('border-green-5
